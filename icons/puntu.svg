<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Puntu — main application icon.
       A GNOME/Adwaita-style rounded tile (accent blue) carrying a white keycap with a
       circular "convert" glyph: keyboard + auto-switch = keyboard-layout corrector. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="1" stop-color="#1a63c4"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f0f9"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="112" height="112" rx="27" fill="url(#tile)"/>
  <!-- soft top sheen -->
  <path d="M35 8h58a27 27 0 0 1 27 27v9c0 8-64 14-112 0v-9A27 27 0 0 1 35 8Z"
        fill="#ffffff" opacity="0.10"/>

  <!-- keycap side (depth) -->
  <rect x="28" y="32" width="72" height="68" rx="16" fill="#123a72" opacity="0.30"/>
  <!-- keycap face -->
  <rect x="28" y="28" width="72" height="68" rx="16" fill="url(#key)" stroke="#d3deee" stroke-width="1"/>

  <!-- circular "convert / auto-switch" glyph -->
  <path transform="translate(38.8,36.8) scale(2.1)"
        d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
        fill="#1a63c4"/>
</svg>
